    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        // Toggle Password
        document.getElementById('toggle-password').addEventListener('click', function () {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });

        // Refresh Captcha
        document.getElementById('refresh-captcha').addEventListener('click', function () {
            document.getElementById('captcha-img').src = 'php/captcha.php?' + Date.now();
            document.getElementById('captcha').value = '';
        });

        // Toast Function
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = type === 'success' ? 'bi-check-circle-fill text-green-500' : 'bi-x-circle-fill text-red-500';

            toast.className = `fixed bottom-6 right-6 z-50 transform transition-all duration-300 flex items-center gap-3 bg-white dark:bg-slate-800 px-6 py-4 rounded-2xl shadow-2xl border-l-[6px] ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
            toast.innerHTML = `
                <i class="bi ${icon} text-xl"></i>
                <div>
                   <h4 class="font-bold text-slate-800 dark:text-white text-sm">${type === 'success' ? 'Success' : 'Error'}</h4>
                   <p class="text-slate-500 dark:text-slate-400 text-xs">${message}</p>
                </div>
            `;

            // Show
            setTimeout(() => toast.classList.remove('translate-y-20', 'opacity-0'), 100);

            // Hide
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3500);
        }

        // Form Submit (Standard POST)
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('email-error');
        const passwordError = document.getElementById('password-error');

        // Regex for basic email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Live Validation Logic
        function validateEmail() {
            const val = emailInput.value.trim();
            if (val === '') {
                showError(emailError, 'Input required');
                emailInput.classList.add('border-red-500', 'ring-red-500/20'); // Add Error Styles
                return false;
            } else if (!emailRegex.test(val) && val.length < 5) {
                showError(emailError, 'Invalid login format');
                emailInput.classList.add('border-red-500', 'ring-red-500/20');
                return false;
            } else {
                hideError(emailError);
                emailInput.classList.remove('border-red-500', 'ring-red-500/20'); // Remove Error Styles
                // emailInput.classList.add('border-green-500'); // Optional: Success State
                return true;
            }
        }

        function validatePassword() {
            const val = passwordInput.value;
            if (val === '') {
                showError(passwordError, 'Password required');
                passwordInput.classList.add('border-red-500', 'ring-red-500/20');
                return false;
            } else {
                hideError(passwordError);
                passwordInput.classList.remove('border-red-500', 'ring-red-500/20');
                return true;
            }
        }

        function showError(element, msg) {
            element.querySelector('span').innerText = msg;
            element.classList.remove('hidden');
            element.classList.add('error-msg'); // Trigger Animation
        }

        function hideError(element) {
            element.classList.add('hidden');
            element.classList.remove('error-msg');
        }

        emailInput.addEventListener('input', validateEmail);
        passwordInput.addEventListener('input', validatePassword);

        // Modify Form Submission to check validation
        loginForm.action = "php/login_action.php";
        loginForm.method = "POST";

        loginForm.addEventListener('submit', function (e) {
            const isEmailValid = validateEmail();
            const isPassValid = validatePassword();

            if (!isEmailValid || !isPassValid) {
                e.preventDefault(); // Stop submission if invalid
                // Shake animation for visual feedback on button/form could go here
                return;
            }

            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
        });

        // Check for URL errors (from PHP redirects)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            showToast(urlParams.get('error'), 'error');
            // Clean URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Dummy Biometric Functions

        // Dummy Biometric Functions
        function loginWithWebcam() { showToast('Webcam feature coming soon!', 'error'); }
        function loginWithFingerprint() { showToast('Fingerprint feature coming soon!', 'error'); }
    </script>
