<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-KITABGHAR | Login Verification</title>
    <link rel="icon" href="img/E-KITABGHAR.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
        }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-4">
    <!-- Background Decor -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[10%] left-[10%] w-64 h-64 bg-indigo-200/40 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[10%] right-[10%] w-96 h-96 bg-violet-200/40 rounded-full blur-3xl"></div>
    </div>

    <div class="bg-white shadow-2xl shadow-indigo-100 rounded-[2.5rem] p-10 w-full max-w-md border border-slate-100 relative overflow-hidden"
        data-aos="zoom-in">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-600 via-violet-600 to-fuchsia-600">
        </div>

        <div class="text-center mb-10">
            <div
                class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
                <i class="bi bi-shield-check text-4xl"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-900 mb-2">New User?</h2>
            <p class="text-slate-500 font-medium">Verify your identity to proceed</p>
            <p class="text-xs text-slate-400 mt-2 px-6">We've sent a 6-digit code to your registered email for your
                first-time setup.</p>
            <!-- [TESTING MODE] Show OTP on screen -->
            <div id="debug-otp-display"
                class="mt-4 p-3 bg-amber-50 border-2 border-dashed border-amber-300 rounded-xl hidden">
                <p class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">🔑 Test Mode - Your OTP</p>
                <p id="debug-otp-value" class="text-2xl font-black text-amber-700 tracking-[0.3em]"></p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="relative">
                <input type="text" id="otp" maxlength="6" placeholder="0 0 0 0 0 0"
                    class="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:outline-none focus:border-indigo-600 focus:bg-white text-center text-3xl tracking-[0.5em] font-black text-slate-800 transition-all placeholder:tracking-normal placeholder:font-normal placeholder:text-slate-300"
                    required />
            </div>

            <p id="error-message" class="text-red-500 text-sm font-bold text-center h-5"></p>

            <button id="verify-otp-btn"
                class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold shadow-xl shadow-slate-200 hover:bg-indigo-600 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group">
                <span class="btn-label">Verify & Continue</span>
                <i class="bi bi-arrow-right group-hover:translate-x-1 transition-transform"></i>
                <div class="hidden animate-spin w-6 h-6 border-4 border-white/30 border-t-white rounded-full"
                    id="verify-spinner"></div>
            </button>

            <div class="pt-6 flex flex-col items-center gap-4">
                <button id="resend-otp-btn"
                    class="text-slate-500 hover:text-indigo-600 font-bold transition-all text-sm flex items-center gap-2">
                    <i class="bi bi-arrow-clockwise"></i> Resend Code
                    <div id="resend-spinner" class="hidden animate-spin"><i class="bi bi-arrow-repeat"></i></div>
                </button>
                <div class="h-px bg-slate-100 w-24"></div>
                <a href="php/logout.php"
                    class="text-slate-400 hover:text-red-500 font-bold text-xs transition-all flex items-center gap-1">
                    <i class="bi bi-box-arrow-left"></i> Cancel and Logout
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>

    <script>
        const verifyBtn = document.getElementById("verify-otp-btn");
        const resendBtn = document.getElementById("resend-otp-btn");
        const verifySpinner = document.getElementById("verify-spinner");
        const otpInput = document.getElementById("otp");
        const errorMsg = document.getElementById("error-message");
        const btnLabel = verifyBtn.querySelector('.btn-label');
        const btnIcon = verifyBtn.querySelector('i');

        otpInput.focus();

        // [TESTING MODE] Show OTP from URL param
        const urlParams = new URLSearchParams(window.location.search);
        const debugOtp = urlParams.get('debug_otp');
        if (debugOtp) {
            document.getElementById('debug-otp-display').classList.remove('hidden');
            document.getElementById('debug-otp-value').textContent = debugOtp;
        }

        verifyBtn.addEventListener("click", () => {
            const otp = otpInput.value.trim();
            if (otp.length !== 6 || isNaN(otp)) {
                showError("Invalid Code Format");
                otpInput.classList.add('border-red-500', 'bg-red-50');
                return;
            }

            startLoading();

            const params = new URLSearchParams();
            params.append('otp', otp);

            fetch("php/verify_login_otp_action.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = data.redirect;
                    } else {
                        stopLoading();
                        showError(data.message);
                        otpInput.classList.add('border-red-500', 'bg-red-50');
                    }
                })
                .catch(err => {
                    stopLoading();
                    showError("Sync Failure");
                });
        });

        resendBtn.addEventListener("click", () => {
            resendBtn.classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('resend-spinner').classList.remove('hidden');

            fetch("php/resend_login_otp.php", { method: "POST" })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    resendBtn.classList.remove('opacity-50', 'pointer-events-none');
                    document.getElementById('resend-spinner').classList.add('hidden');
                });
        });

        function showError(msg) {
            errorMsg.innerText = msg;
            setTimeout(() => errorMsg.innerText = "", 3000);
        }

        function startLoading() {
            verifySpinner.classList.remove("hidden");
            btnLabel.classList.add('hidden');
            btnIcon.classList.add('hidden');
            verifyBtn.disabled = true;
        }

        function stopLoading() {
            verifySpinner.classList.add("hidden");
            btnLabel.classList.remove('hidden');
            btnIcon.classList.remove('hidden');
            verifyBtn.disabled = false;
        }

        otpInput.addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
            this.classList.remove('border-red-500', 'bg-red-50');
        });

        otpInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyBtn.click();
        });
    </script>
</body>

</html>
